entrenar: "1.0"

name: ssc-chat-qwen3-4b-qlora-v2
version: "4.0.0"
description: >
  Shell Safety Classifier chat model v2 — Qwen3-4B NF4 QLoRA retrain (PMAT-167).
  Key changes from v1 (Run 7k):
    1. Data: 22,169 entries (10x vs 2,268) from ShellSafetyBench train split
    2. Response format: "Classification: safe/unsafe" prefix (matches eval harness)
    3. Linter analysis in responses (rule-grounded, not free-form)
    4. Lower lr: 5e-6 (vs 2e-5) after Run 8 divergence at step 220 (ENT-275)
    5. 1 epoch — model converges to loss <2.0 by step 440 (8% of epoch), 3 epochs wasteful
    6. Longer warmup: 100 steps (vs 20) for 22K dataset
    7. Validation every 200 steps for early stopping
    8. Cosine LR decay auto-computed (ENT-275: max_steps = epochs × batches)

seed: 42

model:
  source: "/home/noah/src/models/qwen3-4b/"
  format: safetensors
  device: "cuda"
  dtype: "bfloat16"
  architecture:
    type: transformer
    hidden_size: 2560
    num_layers: 36
    num_heads: 32
    num_kv_heads: 8
    intermediate_size: 9728
    vocab_size: 151936
    max_seq_length: 512
    rope_theta: 1000000.0
    head_dim: 128

data:
  train: "/home/noah/src/bashrs/training/conversations_v4.jsonl"
  tokenizer: "/home/noah/src/models/qwen3-4b/tokenizer.json"
  seq_len: 512
  input_column: "text"
  loader:
    batch_size: 4
    shuffle: true

optimizer:
  name: "adamw"
  lr: 0.000005
  weight_decay: 0.01

scheduler:
  name: "cosine"
  warmup:
    steps: 100

training:
  epochs: 1
  gradient:
    accumulation_steps: 1
    clip_norm: 1.0
  checkpoint:
    save_every: 200
  validation:
    eval_every: 200
    patience: 3

lora:
  enabled: true
  rank: 16
  alpha: 32.0
  target_modules: [q_proj, v_proj]
  quantize_base: true
  quantize_bits: 4
  quant_type: nf4

output:
  dir: "/home/noah/src/bashrs/training/checkpoints/ssc-chat-v11-qwen3-4b"

publish:
  repo: "paiml/shell-safety-chat"
  private: false
  status: "Run 11d — 1 epoch (5,543 steps), vectorized NF4 GEMM, resume from step-600, ETA ~6 days"

# Retrain rationale (PMAT-167, spec v12.17):
#   Root cause of Run 7k failure: CUDA forward path missing RoPE + QK-norm (entrenar#270)
#   Model learned position-agnostic patterns (loss floor 6.66 = ln(151936)/~1.8)
#   but could not learn format compliance without positional encoding
#
# Changes from v1:
#   Data:       2,268 → 22,169 entries (10x, ShellSafetyBench train split)
#   Format:     "Classification: safe/unsafe" prefix in all responses
#   Responses:  Linter-grounded analysis (SEC/DET/IDEM/SC rule citations)
#   LR:         5e-5 → 5e-6 (4x lower after Run 8 divergence at lr=2e-5)
#   Epochs:     1 (model converges by step 440, 3 epochs wasteful at 130s/step)
#   Warmup:     20 → 100 steps (proportional to dataset size)
#   Validation: Every 200 steps with patience=3 early stopping
#   Checkpoints: Every 200 steps (vs 20) — fewer but more meaningful
#
# Preflight gate (6 checks, ALL must pass before training):
#   1. RoPE active in CUDA forward (FALSIFY-PARITY-001)
#   2. QK-norm active in CUDA forward (FALSIFY-PARITY-002)
#   3. CPU/GPU parity < 1e-2 (FALSIFY-PARITY-003)
#   4. LoRA adapters update after 10 steps
#   5. Checkpoint round-trip: save → load → identical output
#   6. Gradient clipping active (clip_norm=1.0)
#
# Expected outcome:
#   - Random baseline: loss ~11.93 (ln(151936))
#   - With RoPE: loss should break 6.66 floor within 200 steps
#   - Target: loss < 3.0, accuracy > 85% on test split
#   - Kill criterion: accuracy < 50% after 1 epoch → KILL-QLORA-002
#
# Run history:
#   Runs 1-6: Qwen2.5-Coder-0.5B full FT (max 32%, catastrophic forgetting)
#   Run 7:  KILLED — LoRA never updated (entrenar#264)
#   Run 7b: KILLED — NF4 GEMM garbage (trueno#180)
#   Run 7c: KILLED step 245 — loss diverging (no grad clip, entrenar#265)
#   Run 7d: KILLED step 40 — LoRA not saved (entrenar#266)
#   Run 7e/7k: 567 steps, loss=6.66 best, eval=66.7% MARGINAL
#     Root cause: CUDA forward missing RoPE+QK-norm (entrenar#270)
#   Run 8: KILLED step ~230 — loss 1.43→10.03 (lr=2e-5 too aggressive, no cosine decay)
#     RoPE fix confirmed (loss broke 6.66 floor to 1.43), but constant lr caused divergence
#     Root cause: max_steps=None → cosine scheduler inactive (ENT-275)
#     Filed: ENT-274 (lower lr), ENT-275 (cosine decay), trueno#187-189 (NF4 perf)
#   Run 9: CRASHED step 600 — loss 15.5→1.66 (CONVERGING, best ever)
#     GPU memory spike 57GB→93GB at step 550, silent crash during checkpoint save
#     Resume from step-400 lost LoRA adapters (loss 2.5→13.9)
#     Root cause: APR checkpoint save had empty NF4 branch — LoRA weights never saved (ENT-276)
#   Run 10: CRASHED step ~450-600 — loss 15.5→1.59 (same trajectory as Run 9)
#     GPU memory spike during 20GB full checkpoint save caused OOM on 128GB unified memory
#     ENT-276 LoRA save/restore confirmed working (step-400 checkpoint had LoRA weights)
#     Root cause: checkpoint save snapshots ALL weights including frozen NF4 base (ENT-282)
#   Run 11: loss 15.5→1.558 at step 440. Crashed after reboot (GB10 power event).
#     Delta checkpoints: 5.9GB (vs 20GB), step-200/400/600 saved without OOM
#     Resume from step-600 worked (delta checkpoint load). Loss diverged to 3-5
#     after resume due to 48GB Qwen-32B apr eval competing for GPU.
#   Run 11b: Resume from step-600, GPU exclusive. Loss 1.68→1.82→4.09 (oscillating)
#     Optimizer state lost on resume → unstable training, loss plateau 2-5.
#   Run 11c: FAILED — shared memory NF4 GEMM tiling 45% SLOWER on unified memory.
#     Barrier sync overhead > bandwidth savings when shared/global are same DRAM.
#   Run 11d: Resume from step-600, original kernel. 1 epoch (5,543 steps), vectorized
#     NF4 GEMM (trueno#187). Loss 1.89→1.82 at step 710.
#     Speed: 15.4 tok/s, MFU 0.49. ETA ~6 days.
