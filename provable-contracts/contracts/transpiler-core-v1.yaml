contract:
  name: transpiler-core-v1
  version: "1.0.0"
  description: >
    Core transpiler invariants (GH-183). Every Rust→Shell transpilation must
    satisfy: determinism, POSIX structure, variable safety, and selective
    stdlib emission. These are falsifiable — a single counterexample breaks
    the contract.
  references:
    - "GH-183: KZ-11 Missing provable contracts"
    - "GH-148: rash transpiler stdlib"
  spec: docs/specifications/STDLIB.md
  phase: "Transpiler core"

invariants:
  - "Transpilation is deterministic: same Rust input → byte-identical shell output"
  - "Output is POSIX-structured: #!/bin/sh, set -euf, main() wrapper"
  - "All variables are double-quoted to prevent word splitting"
  - "Only used stdlib functions are emitted (dead code elimination)"

falsification_tests:
  # ── Determinism ──────────────────────────────────────────────
  - id: F-CORE-001
    description: "Transpiling identical input twice produces byte-identical output"
    input: |
      fn main() {
          let x = 42;
          println!("{}", x);
      }
    assertion: "transpile(input) == transpile(input) for all valid inputs"
    status: PASS

  - id: F-CORE-002
    description: "Determinism holds for complex programs with stdlib calls"
    input: |
      fn main() {
          let user = capture("whoami");
          mkdir("/tmp/test");
          for f in glob("*.txt") { println!("{}", f); }
          if string_starts_with(user, "root") { exit(1); }
      }
    assertion: "transpile(input) == transpile(input) — stdlib does not introduce non-determinism"
    status: PASS

  # ── POSIX Structure ──────────────────────────────────────────
  - id: F-CORE-003
    description: "Every transpiled script starts with #!/bin/sh shebang"
    assertion: "output.starts_with('#!/bin/sh') for all inputs"
    status: PASS

  - id: F-CORE-004
    description: "Every transpiled script contains 'set -euf' safety flags"
    assertion: "output.contains('set -euf') for all inputs"
    status: PASS

  - id: F-CORE-005
    description: "Every transpiled script wraps code in main() function"
    assertion: "output.contains('main()') AND output.contains('main \"$@\"')"
    status: PASS

  # ── Variable Safety ──────────────────────────────────────────
  - id: F-CORE-006
    description: "Variable references are always double-quoted (prevents word splitting)"
    input: |
      fn main() {
          let name = "hello world";
          println!("{}", name);
      }
    assertion: "variable expansion uses \"$name\" not bare $name"
    status: PASS

  # ── Selective Stdlib Emission ────────────────────────────────
  - id: F-CORE-007
    description: "Unused stdlib functions are NOT emitted (dead code elimination)"
    input: |
      fn main() {
          let x = 42;
          println!("{}", x);
      }
    assertion: "output does NOT contain rash_string_ or rash_fs_ functions"
    status: PASS

  - id: F-CORE-008
    description: "Used stdlib functions ARE emitted as shell function definitions"
    input: |
      fn main() {
          if string_contains("hello world", "hello") {
              println!("found");
          }
      }
    assertion: "output contains 'rash_string_contains()' function definition"
    status: PASS

  # ── Idempotent Operations ────────────────────────────────────
  - id: F-CORE-009
    description: "mkdir() always uses -p flag for idempotency"
    input: |
      fn main() { mkdir("/tmp/test"); }
    assertion: "output contains 'mkdir' AND '-p'"
    status: PASS

  # ── Pipe Safety ──────────────────────────────────────────────
  - id: F-CORE-010
    description: "capture() with pipes preserves pipeline semantics"
    input: |
      fn main() { let c = capture("ls | wc -l"); }
    assertion: "output preserves '|' operator (not escaped as literal)"
    status: PASS

  - id: F-CORE-011
    description: "capture() without pipes uses direct $(cmd) form"
    input: |
      fn main() { let u = capture("whoami"); }
    assertion: "output contains $(whoami), no sh -c wrapper"
    status: PASS
