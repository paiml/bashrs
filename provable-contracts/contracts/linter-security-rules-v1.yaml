metadata:
  version: 1.0.0
  verification_level: L5
  description: Provable security rule contracts (GH-183). Each SEC rule must detect known-vulnerable patterns (soundness)
    and not flag known-safe patterns (precision). A single missed detection or false positive falsifies the contract.
  verification_command: cargo test -p bashrs --lib -- sec
  depends_on:
  - parser-soundness-v1
  references:
  - 'GH-183: KZ-11 Missing provable contracts'
  - OWASP Command Injection
  - 'CWE-78: OS Command Injection'
  - 'CWE-798: Hardcoded Credentials'
kernel_structure:
  phases:
  - name: tokenize
    description: Split shell source into lines and identify command tokens
    invariant: All lines are examined for security patterns
  - name: pattern_match
    description: Match tokens against OWASP injection vectors (eval, curl|sh, chmod 777, hardcoded secrets)
    invariant: SEC001-SEC008 cover all OWASP top shell injection vectors
  - name: emit_diagnostics
    description: Emit LintDiagnostic with rule ID, severity, span, and fix suggestion
    invariant: Each diagnostic has a unique SEC rule ID and actionable message
equations:
  security_detection:
    formula: 'forall s in Vulnerable: exists rule in SEC: fires(rule, s)'
    domain: 's: script containing injection, eval, curl|sh, chmod 777, etc.'
    codomain: Vec<LintDiagnostic> with SEC001-SEC008 rule IDs
    invariants:
    - SEC rules detect all OWASP-class vulnerabilities
    - SEC rules do NOT false-positive on safe code
proof_obligations:
- type: invariant
  property: SEC rules detect all OWASP-class vulnerabilities
  formal: SEC rules detect all OWASP-class vulnerabilities
  tolerance: 0.0
  applies_to: all
- type: invariant
  property: SEC rules do NOT false-positive on safe code
  formal: SEC rules do NOT false-positive on safe code
  tolerance: 0.05
  applies_to: all
invariants:
- Each SEC rule detects known-vulnerable patterns (soundness)
- Each SEC rule does NOT flag known-safe patterns (precision)
- SEC001-SEC008 cover OWASP top shell injection vectors
- 'Rules are independent: disabling one does not affect others'
falsification_tests:
- id: F-SEC001-SOUND
  rule: SEC001 detects eval with variable input
  prediction: lint result contains SEC001 diagnostic
  test: 'Given input, verify: lint result contains SEC001 diagnostic'
  if_fails: 'Contract violation: SEC001 detects eval with variable input'
- id: F-SEC001-PRECISE
  rule: SEC001 does NOT flag eval as substring or safe POSIX indi...
  prediction: lint result does NOT contain SEC001 for substring or safe indirection pattern
  test: 'Given input, verify: lint result does NOT contain SEC001 for substring or safe indirection pattern'
  if_fails: 'Contract violation: SEC001 does NOT flag eval as substring or safe POSIX indi...'
- id: F-SEC002-SOUND
  rule: SEC002 detects unquoted variable in network commands (cur...
  prediction: lint result contains SEC002 diagnostic
  test: 'Given input, verify: lint result contains SEC002 diagnostic'
  if_fails: 'Contract violation: SEC002 detects unquoted variable in network commands (cur...'
- id: F-SEC002-PRECISE
  rule: SEC002 does NOT flag quoted variable in network command
  prediction: lint result does NOT contain SEC002 diagnostic
  test: 'Given input, verify: lint result does NOT contain SEC002 diagnostic'
  if_fails: 'Contract violation: SEC002 does NOT flag quoted variable in network command'
- id: F-SEC003-SOUND
