metadata:
  version: 1.0.0
  verification_level: L5
  description: Provable determinism and idempotency linter contracts (GH-183). DET rules detect non-deterministic constructs
    ($RANDOM, timestamps, unordered globs, system state). IDEM rules detect non-idempotent operations (mkdir without -p, rm
    without -f, ln without -sf). Each rule must detect known-bad and not false-positive on known-safe.
  verification_command: cargo test -p bashrs --lib -- det
  depends_on:
  - parser-soundness-v1
  references:
  - 'GH-183: KZ-11 Missing provable contracts'
  - 'CLAUDE.md: Critical Invariants — Determinism + Idempotency'
kernel_structure:
  phases:
  - name: scan_nondet
    description: Scan shell source for non-deterministic constructs ($RANDOM, date, unordered globs, system state)
    invariant: DET001-DET004 detect all non-deterministic patterns
  - name: scan_nonidem
    description: Scan shell source for non-idempotent operations (mkdir, rm, ln without safety flags)
    invariant: IDEM001-IDEM003 detect all non-idempotent operations
  - name: emit_diagnostics
    description: Emit LintDiagnostic with DET/IDEM rule ID, severity, span, and auto-fix suggestion
    invariant: Each diagnostic includes an actionable fix
equations:
  determinism_detection:
    formula: 'forall s in NonDeterministic: exists rule in DET: fires(rule, s)'
    domain: 's: script containing $RANDOM, timestamps, unordered globs, or system state'
    codomain: Vec<LintDiagnostic> with DET rule IDs
    invariants:
    - DET rules detect all non-deterministic constructs
    - DET rules do NOT false-positive on deterministic code
proof_obligations:
- type: invariant
  property: DET rules detect all non-deterministic constructs
  formal: DET rules detect all non-deterministic constructs
  tolerance: 0.0
  applies_to: all
- type: invariant
  property: DET rules do NOT false-positive on deterministic code
  formal: DET rules do NOT false-positive on deterministic code
  tolerance: 0.05
  applies_to: all
invariants:
- DET rules detect all non-deterministic constructs ($RANDOM, timestamps, system state)
- DET rules do NOT false-positive on deterministic code
- IDEM rules detect non-idempotent operations (mkdir without -p, rm without -f)
- IDEM rules do NOT false-positive on idempotent operations
falsification_tests:
- id: F-DET001-SOUND
  rule: DET001 detects $RANDOM usage
  prediction: lint result contains DET001
  test: 'Given input, verify: lint result contains DET001'
  if_fails: 'Contract violation: DET001 detects $RANDOM usage'
- id: F-DET001-PRECISE
  rule: DET001 does NOT flag literal integer assignment
  prediction: lint result does NOT contain DET001
  test: 'Given input, verify: lint result does NOT contain DET001'
  if_fails: 'Contract violation: DET001 does NOT flag literal integer assignment'
- id: F-DET002-SOUND
  rule: DET002 detects date in command substitution
  prediction: lint result contains DET002 for date command substitution
  test: 'Given input, verify: lint result contains DET002 for date command substitution'
  if_fails: 'Contract violation: DET002 detects date in command substitution'
- id: F-DET002-PRECISE
  rule: DET002 does NOT flag static string assignment
  prediction: lint result does NOT contain DET002
  test: 'Given input, verify: lint result does NOT contain DET002'
  if_fails: 'Contract violation: DET002 does NOT flag static string assignment'
- id: F-DET003-SOUND
  rule: DET003 detects unordered glob in for-loop
  prediction: lint result contains DET003
  test: 'Given input, verify: lint result contains DET003'
  if_fails: 'Contract violation: DET003 detects unordered glob in for-loop'
- id: F-DET003-PRECISE
  rule: DET003 does NOT flag sorted glob
  prediction: lint result does NOT contain DET003
  test: 'Given input, verify: lint result does NOT contain DET003'
  if_fails: 'Contract violation: DET003 does NOT flag sorted glob'
- id: F-DET004-SOUND
  rule: DET004 detects command substitution with system-state com...
  prediction: lint result contains DET004
  test: 'Given input, verify: lint result contains DET004'
  if_fails: 'Contract violation: DET004 detects command substitution with system-state com...'
- id: F-DET004-PRECISE
  rule: DET004 does NOT flag static command
  prediction: lint result does NOT contain DET004
  test: 'Given input, verify: lint result does NOT contain DET004'
  if_fails: 'Contract violation: DET004 does NOT flag static command'
- id: F-IDEM001-SOUND
  rule: IDEM001 detects mkdir without -p
  prediction: lint result contains IDEM001
  test: 'Given input, verify: lint result contains IDEM001'
  if_fails: 'Contract violation: IDEM001 detects mkdir without -p'
- id: F-IDEM001-PRECISE
  rule: IDEM001 does NOT flag mkdir -p
  prediction: lint result does NOT contain IDEM001
  test: 'Given input, verify: lint result does NOT contain IDEM001'
  if_fails: 'Contract violation: IDEM001 does NOT flag mkdir -p'
- id: F-IDEM002-SOUND
  rule: IDEM002 detects rm without -f
  prediction: lint result contains IDEM002
  test: 'Given input, verify: lint result contains IDEM002'
  if_fails: 'Contract violation: IDEM002 detects rm without -f'
- id: F-IDEM002-PRECISE
  rule: IDEM002 does NOT flag rm -f
  prediction: lint result does NOT contain IDEM002
  test: 'Given input, verify: lint result does NOT contain IDEM002'
  if_fails: 'Contract violation: IDEM002 does NOT flag rm -f'
- id: F-IDEM003-SOUND
  rule: IDEM003 detects ln -s without force
  prediction: lint result contains IDEM003
  test: 'Given input, verify: lint result contains IDEM003'
  if_fails: 'Contract violation: IDEM003 detects ln -s without force'
- id: F-IDEM003-PRECISE
  rule: IDEM003 does NOT flag ln -sf
  prediction: lint result does NOT contain IDEM003
  test: 'Given input, verify: lint result does NOT contain IDEM003'
  if_fails: 'Contract violation: IDEM003 does NOT flag ln -sf'
kani_harnesses:
- id: KANI-LINTER_DET_IDEM-001
  obligation: DET rules detect all non-deterministic constructs
  property: DET rules detect all non-deterministic constructs
  bound: 4
  strategy: stub_float
  harness: verify_linter_det_idem_invariant
- id: KANI-LINTER_DET_IDEM-002
  obligation: DET rules do NOT false-positive on deterministic code
  property: DET rules do NOT false-positive on deterministic code
  bound: 4
  strategy: stub_float
  harness: verify_det_idem_no_false_positives
