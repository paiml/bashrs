metadata:
  version: "1.0.0"
  description: |
    Qwen3-4B NF4 QLoRA training contract for Shell Safety Classifier chat model.
    Run 7: First true LoRA training after ENT-LoRA-001..018 implementation.
    Upgraded from Qwen2.5-Coder-0.5B (6 failed full-FT runs, max 32% accuracy)
    to Qwen3-4B (8x capacity, NF4 quantized base, LoRA adapters on Q/V/O/Gate).
    Binary classification + explanation + fix suggestions for shell scripts.
  created: "2026-03-08"
  spec_ref: "docs/specifications/shell-safety-inference.md Section 14"
  references:
    - "Hu et al. (2021) LoRA: Low-Rank Adaptation of Large Language Models (arXiv:2106.09685)"
    - "Dettmers et al. (2023) QLoRA: Efficient Finetuning of Quantized LLMs (arXiv:2305.14314)"
  depends_on:
    - "chat-model-training-v1"
    - "shellsafetybench-v1"

model:
  name: "Qwen3-4B"
  source: "/home/noah/src/models/qwen3-4b/"
  architecture:
    hidden_size: 2560
    num_layers: 36
    num_heads: 32
    num_kv_heads: 8
    intermediate_size: 9728
    vocab_size: 151936
    max_seq_length: 512
    rope_theta: 1000000.0
    head_dim: 128
  quantization:
    type: nf4
    block_size: 64
    dtype_base: bfloat16
  lora:
    rank: 16
    alpha: 32.0
    target_modules: [q_proj, v_proj, o_proj, gate_proj]
    trainable_params: 5903362
    trainable_pct: 0.15

equations:
  lora_forward:
    formula: "h = W_nf4 @ x + (alpha / rank) * B @ A @ x"
    domain: "x in R^{d_in}, W_nf4 in NF4^{d_out x d_in}, A in R^{rank x d_in}, B in R^{d_out x rank}"
    codomain: "R^{d_out}"
    invariants:
      - "Base weights W_nf4 are frozen (quantized, no gradient updates)"
      - "Only A and B matrices receive gradients"
      - "rank=16 << min(d_in, d_out) ensures low-rank bottleneck"
      - "Scaling factor alpha/rank = 32/16 = 2.0"

  nf4_quantization:
    formula: "W_nf4 = quantize_nf4(W_bf16, block_size=64)"
    domain: "W_bf16 in BF16^{d_out x d_in}"
    codomain: "W_nf4 in NF4^{d_out x d_in} (4-bit normal float, 64-element blocks)"
    invariants:
      - "Block size = 64 elements per quantization group"
      - "NF4 uses information-theoretically optimal 4-bit data type for normally distributed weights"
      - "Quantization is applied once at model load, not during training"
      - "Dequantization for forward pass: W_approx = dequantize_nf4(W_nf4)"

  qlora_gradient:
    formula: "dL/dA = B^T @ (dL/dh) @ x^T ; dL/dB = (dL/dh) @ (A @ x)^T"
    domain: "dL/dh in R^{d_out}, x in R^{d_in}, A in R^{rank x d_in}, B in R^{d_out x rank}"
    codomain: "dL/dA in R^{rank x d_in}, dL/dB in R^{d_out x rank}"
    invariants:
      - "Gradients flow through B and A only (base weights frozen)"
      - "Chain rule applied through the low-rank decomposition"
      - "No gradient computation for W_nf4 (saves memory)"

preconditions:
  - "Qwen3-4B base weights available in safetensors format"
  - "Tokenizer (tokenizer.json) from Qwen3-4B checkpoint"
  - "Training data: conversations_v3.jsonl (balanced safe/unsafe, ChatML format)"
  - "CUDA GPU with >= 8GB VRAM (RTX 4090 recommended)"
  - "entrenar with ENT-LoRA-001..018 LoRA + NF4 support"

postconditions:
  - id: C-QLORA-001
    description: "Base weights remain frozen throughout training"
    formal: "checksum(W_nf4_before) == checksum(W_nf4_after) for all base parameters"
    applies_to: all

  - id: C-QLORA-002
    description: "LoRA adapters receive gradient updates"
    formal: "||grad(A)|| > 0 AND ||grad(B)|| > 0 for each LoRA target module"
    applies_to: all

  - id: C-QLORA-003
    description: "Training loss decreases over 500 steps"
    formal: "train_loss(step=500) < train_loss(step=0) * 0.8"
    applies_to: all

  - id: C-QLORA-004
    description: "Adapter checkpoint in PEFT-compatible format"
    formal: "output_dir contains adapter_config.json AND adapter.safetensors"
    applies_to: all

  - id: C-QLORA-005
    description: "Classification accuracy exceeds random baseline"
    formal: "accuracy > 0.50 on held-out test set"
    applies_to: all

  - id: C-QLORA-006
    description: "No catastrophic forgetting of base model capabilities"
    formal: "model generates coherent instruction-following responses after training"
    applies_to: all

  - id: C-QLORA-007
    description: "VRAM usage within budget"
    formal: "peak_gpu_memory < 8GB during training"
    applies_to: all

invariants:
  - "NF4 base weights are read-only during forward and backward passes"
  - "LoRA scaling factor is constant: alpha/rank = 32.0/16 = 2.0"
  - "Trainable parameters are exactly the 72 LoRA A/B matrix pairs (4 targets x 36 layers x 2)"
  - "Effective model output = NF4_dequantize(W_base) @ x + 2.0 * B @ A @ x"
  - "Gradient accumulation (4 steps) simulates effective batch size of 16"

proof_obligations:
  - type: invariant
    property: "Base weight freezing"
    formal: "W_nf4[layer][module] is bit-identical before and after any training step"
    applies_to: all

  - type: invariant
    property: "LoRA gradient flow"
    formal: "For each LoRA module: requires_grad(A) == true AND requires_grad(B) == true"
    applies_to: all

  - type: convergence
    property: "Loss decreases"
    formal: "E[L(step_t)] < E[L(step_{t-k})] for k >= 100 (moving average)"
    tolerance: 0.05
    applies_to: all

  - type: correctness
    property: "PEFT format compliance"
    formal: "adapter_config.json has keys: r, lora_alpha, target_modules, task_type, base_model_name_or_path"
    applies_to: all

falsification_tests:
  - id: FALSIFY-QLORA-001
    rule: "Base weight freezing"
    prediction: "NF4-quantized base weights are unchanged after a full training epoch"
    test: >
      Snapshot all base model parameter checksums before training.
      Run 1 epoch of QLoRA training.
      Compare checksums after training.
      All base weight checksums must be identical.
    if_fails: "Gradient leaking through frozen NF4 parameters — entrenar LoRA isolation is broken"

  - id: FALSIFY-QLORA-002
    rule: "LoRA gradient flow"
    prediction: "A and B matrices for all 4 target modules (q_proj, v_proj, o_proj, gate_proj) have non-zero gradients after a backward pass"
    test: >
      Run 1 training step with a single batch.
      Inspect grad(A) and grad(B) for each of the 144 LoRA matrices (4 modules x 36 layers).
      All 288 gradient tensors must have ||grad|| > 0.
    if_fails: "LoRA adapter not connected to computation graph — check forward/backward wiring"

  - id: FALSIFY-QLORA-003
    rule: "Loss monotonicity"
    prediction: "Training loss at step 500 is less than initial loss (step 0)"
    test: >
      Record train_loss at step 0 (first batch) and step 500.
      Assert train_loss(500) < train_loss(0) * 0.8 (at least 20% reduction).
    if_fails: "Learning rate too high, data format mismatch, or optimizer misconfiguration"

  - id: FALSIFY-QLORA-004
    rule: "PEFT export format"
    prediction: "Training produces adapter_config.json and adapter.safetensors in output directory"
    test: >
      Run training to completion (1 epoch).
      Verify output_dir contains: adapter_config.json, adapter.safetensors.
      Verify adapter_config.json is valid JSON with required PEFT keys:
      r, lora_alpha, target_modules, task_type, base_model_name_or_path.
    if_fails: "Checkpoint serialization missing PEFT metadata — entrenar export format incomplete"

  - id: FALSIFY-QLORA-005
    rule: "Architecture preservation"
    prediction: "adapter_config.json specifies Qwen3ForCausalLM as base model architecture"
    test: >
      Parse adapter_config.json from training output.
      Assert base_model_name_or_path contains 'qwen3' (case-insensitive).
      Assert model_type == 'qwen3' or architectures contains 'Qwen3ForCausalLM'.
    if_fails: "entrenar hardcoding wrong architecture (see RCA-CHAT-002 from chat-model-training-v1)"

  - id: FALSIFY-QLORA-006
    rule: "Trainable parameter count"
    prediction: "Exactly ~5.9M trainable parameters (0.15% of base model)"
    test: >
      Count parameters with requires_grad=true after LoRA injection.
      Assert 5_500_000 < trainable_params < 6_500_000.
      Assert trainable_pct < 0.20% of total base model parameters.
      Verify: 4 target modules x 36 layers x 2 matrices (A,B) = 288 trainable tensors.
    if_fails: "Wrong number of LoRA targets injected, or base weights not properly frozen"

  - id: FALSIFY-QLORA-007
    rule: "Accuracy improvement"
    prediction: "Classification accuracy exceeds 50% on held-out test set (above random baseline for binary classification)"
    test: >
      Run inference on 50-entry eval set with trained adapter.
      Parse model responses for classification labels (safe/unsafe).
      Compute accuracy = correct / total.
      Assert accuracy > 0.50 (random baseline for binary = 0.50).
    if_fails: "Model not learning from training data — check data format, label distribution, or adapter merging"

  - id: FALSIFY-QLORA-008
    rule: "VRAM budget"
    prediction: "Peak GPU memory usage during training is less than 8GB"
    test: >
      Monitor nvidia-smi peak memory during 100 training steps.
      Assert max_memory_allocated < 8GB.
      Breakdown budget: NF4 base (~2GB) + LoRA params (~23MB) +
      optimizer states (~46MB) + activations/gradients (~3-5GB) < 8GB total.
    if_fails: "Memory leak, activation checkpointing not enabled, or batch size too large"

  - id: FALSIFY-QLORA-009
    rule: "No catastrophic forgetting"
    prediction: "Model retains instruction-following format after QLoRA training"
    test: >
      After training, prompt model with 10 diverse shell analysis queries.
      Verify at least 8/10 responses follow instruction format (structured output, not gibberish).
      Compare with pre-training baseline: response coherence must not degrade.
    if_fails: "LoRA rank too high or alpha too large — adapter overwriting base model behavior"

  - id: FALSIFY-QLORA-010
    rule: "Gradient accumulation correctness"
    prediction: "Effective batch size equals batch_size * gradient_accumulation = 4 * 4 = 16"
    test: >
      Run 4 micro-steps with gradient accumulation.
      Compare accumulated gradient to single step with batch_size=16.
      Assert ||grad_accumulated - grad_full_batch|| < epsilon (relative tolerance 1e-5).
    if_fails: "Gradient accumulation not dividing by accumulation steps, or optimizer stepping every micro-batch"

kill_criteria:
  - id: KILL-QLORA-001
    condition: "Accuracy < 50% on 50-entry eval after full training"
    action: "Task requires >= 8B model. Ship classifier-only pipeline (MLP probe MCC=0.754)."

  - id: KILL-QLORA-002
    condition: "VRAM exceeds 24GB (OOM on RTX 4090)"
    action: "Reduce LoRA rank to 8 or remove gate_proj from targets. If still OOM, use CPU offloading."

  - id: KILL-QLORA-003
    condition: "Training loss does not decrease after 1000 steps"
    action: "Debug LoRA gradient flow. Verify NF4 dequantization produces valid activations."

benchmarks:
  prior_runs:
    note: "Runs 1-6 used Qwen2.5-Coder-0.5B with full fine-tuning (LoRA silently ignored)"
    best_accuracy: "32.0% (Run 6, balanced v3 data, 3 epochs)"
    best_loss: "0.607 (Run 4, 1 epoch)"
    failure_mode: "Catastrophic forgetting destroys instruction-following after epoch 1 with full FT"
  run_7:
    note: "PLANNED — first true QLoRA training with Qwen3-4B NF4"
    hardware: "RTX 4090, 24GB VRAM, CUDA"
    model: "Qwen3-4B (NF4 quantized, ~2GB base + LoRA adapters)"
    data: "conversations_v3.jsonl (balanced safe/unsafe)"
    expected_vram: "5-7 GB"
    expected_throughput: "~3 sam/s (based on prior NF4 Qwen3-4B run)"
    success_threshold: ">85% accuracy (C-CHAT-TRAIN-002)"
    kill_threshold: "<50% accuracy (KILL-QLORA-001)"
