metadata:
  version: 1.0.0
  verification_level: L5
  description: Provable purification contracts (GH-183). The bash purifier transforms non-deterministic bash into safe, idempotent
    POSIX sh. Each invariant is falsifiable — a single counterexample breaks the contract.
  verification_command: cargo test -p bashrs --lib -- purif
  depends_on:
  - parser-soundness-v1
  - encoder-roundtrip-v1
  - linter-det-idem-v1
  references:
  - 'GH-183: KZ-11 Missing provable contracts'
  - 'CLAUDE.md: Workflow 1 — Bash → Purified Bash (PRIMARY)'
kernel_structure:
  phases:
  - name: parse
    description: Parse non-deterministic bash script into AST
    invariant: Valid bash always parses without error
  - name: detect_nondet
    description: Identify $RANDOM, timestamps, and non-idempotent operations in AST
    invariant: All non-deterministic constructs are detected
  - name: rewrite
    description: Apply determinism and idempotency transformations (mkdir -p, rm -f, ln -sf)
    invariant: Operations made idempotent with -p/-f flags
  - name: emit
    description: Emit purified POSIX sh script with quoted variables and shebang
    invariant: Output passes shellcheck -s sh
equations:
  purification:
    formula: purify(bash_script) -> posix_script where is_deterministic(posix_script) AND is_idempotent(posix_script)
    domain: 'bash_script: non-deterministic bash with $RANDOM, timestamps'
    codomain: 'posix_script: deterministic, idempotent POSIX sh'
    invariants:
    - Purified output passes shellcheck -s sh
    - All $RANDOM/timestamps removed
    - Operations made idempotent with -p/-f flags
proof_obligations:
- type: invariant
  property: Purified output passes shellcheck -s sh
  formal: Purified output passes shellcheck -s sh
  tolerance: 0.0
  applies_to: all
- type: invariant
  property: All $RANDOM/timestamps removed
  formal: All $RANDOM/timestamps removed
  tolerance: 0.0
  applies_to: all
- type: invariant
  property: Operations made idempotent with -p/-f flags
  formal: Operations made idempotent with -p/-f flags
  tolerance: 0.0
  applies_to: all
invariants:
- 'Purified output is deterministic: same input produces identical output'
- Non-deterministic constructs ($RANDOM, timestamps) are removed
- 'Operations are idempotent: mkdir -p, rm -f, ln -sf'
- Output is POSIX-compliant (#!/bin/sh, passes shellcheck)
- Variables are double-quoted to prevent injection
falsification_tests:
- id: F-PURIFY-001
  rule: $RANDOM is replaced with deterministic value
  prediction: purified output does NOT contain '$RANDOM'
  test: 'Given input, verify: purified output does NOT contain ''$RANDOM'''
  if_fails: 'Contract violation: $RANDOM is replaced with deterministic value'
- id: F-PURIFY-002
  rule: Purification is itself deterministic (same input → same o...
  prediction: purify(input) == purify(input)
  test: 'Given input, verify: purify(input) == purify(input)'
  if_fails: 'Contract violation: Purification is itself deterministic (same input → same o...'
- id: F-PURIFY-003
  rule: mkdir becomes mkdir -p (safe to re-run)
  prediction: purified output contains 'mkdir -p'
  test: 'Given input, verify: purified output contains ''mkdir -p'''
  if_fails: 'Contract violation: mkdir becomes mkdir -p (safe to re-run)'
- id: F-PURIFY-004
  rule: rm becomes rm -f (safe to re-run)
  prediction: purified output contains 'rm -f'
  test: 'Given input, verify: purified output contains ''rm -f'''
  if_fails: 'Contract violation: rm becomes rm -f (safe to re-run)'
- id: F-PURIFY-005
  rule: 'CLI purify replaces #!/bin/bash with #!/bin/sh (POSIX)'
  prediction: 'CLI ''bashrs purify'' output starts with #!/bin/sh and does not contain #!/bin/bash'
  test: 'Given input, verify: CLI ''bashrs purify'' output starts with #!/bin/sh and does not contain #!/bin/bash'
  if_fails: 'Contract violation: CLI purify replaces #!/bin/bash with #!/bin/sh (POSIX)'
- id: F-PURIFY-006
  rule: Unquoted variables get double-quoted
  prediction: purified output contains '"$unquoted_var"'
  test: 'Given input, verify: purified output contains ''"$unquoted_var"'''
  if_fails: 'Contract violation: Unquoted variables get double-quoted'
- id: F-PURIFY-007
  rule: Purified output of non-deterministic input has zero DET v...
  prediction: lint(purify(input)) has zero DET-rule diagnostics
  test: 'Given input, verify: lint(purify(input)) has zero DET-rule diagnostics'
  if_fails: 'Contract violation: Purified output of non-deterministic input has zero DET v...'
- id: F-PURIFY-008
  rule: Purified output of non-idempotent input has zero IDEM vio...
  prediction: lint(purify(input)) has zero IDEM-rule diagnostics
  test: 'Given input, verify: lint(purify(input)) has zero IDEM-rule diagnostics'
  if_fails: 'Contract violation: Purified output of non-idempotent input has zero IDEM vio...'
- id: F-PURIFY-009
  rule: Purification of already-pure code is idempotent
  prediction: purify(purify(input)) == purify(input)
  test: 'Given input, verify: purify(purify(input)) == purify(input)'
  if_fails: 'Contract violation: Purification of already-pure code is idempotent'
- id: F-PURIFY-010
  rule: echo with literal args is preserved unchanged
  prediction: purified output preserves 'echo hello world' semantics
  test: 'Given input, verify: purified output preserves ''echo hello world'' semantics'
  if_fails: 'Contract violation: echo with literal args is preserved unchanged'
kani_harnesses:
- id: KANI-PURIFICATION_PIPELINE-001
  obligation: Purified output passes shellcheck -s sh
  property: Purified output passes shellcheck -s sh
  bound: 4
  strategy: stub_float
  harness: verify_purification_pipeline_invariant
- id: KANI-PURIFICATION_PIPELINE-002
  obligation: All $RANDOM/timestamps removed
  property: All $RANDOM/timestamps removed
  bound: 4
  strategy: stub_float
  harness: verify_purification_no_random_timestamps
- id: KANI-PURIFICATION_PIPELINE-003
  obligation: Operations made idempotent with -p/-f flags
  property: Operations made idempotent with -p/-f flags
  bound: 4
  strategy: stub_float
  harness: verify_purification_idempotent_flags
