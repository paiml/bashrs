metadata:
  version: '1.0'
  description: 'Pure-Rust CodeBERT encoder for WASM inference. Implements the full

    RoBERTa transformer encoder (12 layers, 768-dim, 12 heads) using

    only f32 operations. Loads int8 SafeTensors weights.


    Kill criterion 5 triggered: 2681ms native CPU for 33 tokens.

    Estimated WASM performance: 5-13 seconds (2-5x slowdown).

    Threshold: 2000ms. Decision: Ship CLI only.'
  references:
  - Devlin et al. (2019) BERT
  - docs/specifications/shell-safety-inference.md
equations:
  wasm_encoding:
    formula: encode_wasm(tokens) ~= encode_native(tokens) within tolerance
    domain: 'tokens: Vec<u32> (tokenized input)'
    codomain: R^{768} (CLS embedding vector)
    invariants:
    - WASM and native produce equivalent embeddings
    - Inference time < 5s in browser
proof_obligations:
- type: invariant
  property: WASM and native produce equivalent embeddings
  formal: WASM and native produce equivalent embeddings
  applies_to: all
- type: invariant
  property: Inference time < 5s in browser
  formal: Inference time < 5s in browser
  applies_to: all
falsification_tests:
- id: FALSIFY-WASM-ENC-001
  rule: WASM and native produce equivalent embeddings
  prediction: Embedding vectors match within 1e-4 tolerance
  test: Compare WASM encode output vs native encode output for same input tokens
  if_fails: 'Contract violation: WASM encoder diverges from native encoder'
- id: FALSIFY-WASM-ENC-002
  rule: Inference time within performance budget
  prediction: Native inference completes within 5 seconds for 33 tokens
  test: Benchmark encode() with 33-token input, verify < 5000ms
  if_fails: 'Contract violation: Encoder too slow for interactive use'
kani_harnesses:
- id: KANI-WASM_CODEBERT_ENCODER-001
  obligation: WASM and native produce equivalent embeddings
  property: WASM and native produce equivalent embeddings
  bound: 4
  strategy: stub_float
  harness: verify_wasm_codebert_encoder_invariant
