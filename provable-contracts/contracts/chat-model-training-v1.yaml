metadata:
  version: "1.3.0"
  description: "Chat model training — Qwen2.5-Coder-0.5B-Instruct LoRA fine-tuning on shell safety conversations"
  references:
    - "Hu et al. (2021) LoRA: Low-Rank Adaptation of Large Language Models"
    - "SSC v11 Section 7: Chat Model Fine-Tuning"
  depends_on:
    - "classifier-pipeline-v1"
    - "chat-inference-pipeline-v1"

equations:
  lora_forward:
    formula: "h = W_0 @ x + (alpha/rank) * B @ A @ x"
    domain: "x in R^{d_in}, W_0 in R^{d_out x d_in}, A in R^{rank x d_in}, B in R^{d_out x rank}"
    codomain: "R^{d_out}"
    invariants:
      - "Base weights W_0 are frozen (no gradient updates)"
      - "Only A, B matrices receive gradients"
      - "Effective rank << min(d_in, d_out)"

  chat_loss:
    formula: "L = -sum_t log P(y_t | y_{<t}, x) for response tokens only"
    domain: "x = prompt tokens, y = response tokens"
    codomain: "R (scalar loss)"
    invariants:
      - "Loss computed only on assistant response tokens (not system/user)"
      - "Cross-entropy with teacher forcing"

postconditions:
  - id: C-CHAT-TRAIN-001
    description: "Training converges — loss decreases over epochs"
    formal: "train_loss(epoch=3) < train_loss(epoch=1) * 0.8"
    applies_to: all
    status: WEAK_PASS
    evidence: >
      Run 4 (1 epoch, LR=5e-5, bias fix): loss=1.86, ppl=6.44, best=0.607.
      Model converges within single epoch (18.3→1.86). PASS for 1 epoch.
      Run 3 (3 epochs): Epoch 1=1.52, Epoch 2=3.88, Epoch 3=4.01 — FAIL (diverges).
      Convergence holds ONLY with 1-epoch training. Multi-epoch catastrophic forgetting.

  - id: C-CHAT-TRAIN-002
    description: "Classification accuracy from parsed chat response exceeds 85%"
    formal: "accuracy > 0.85 on test set"
    applies_to: all
    status: FAIL
    evidence: >
      Run 1: Gibberish output, 0% accuracy.
      Run 3 (3 epochs): 3.0% accuracy (1/33), degenerate output.
      Run 4 (1 epoch): 12.1% accuracy (4/33), coherent domain-relevant text.
      Model generates structured advice about shell safety (command injection,
      unquoted variables, non-determinism) but doesn't follow classification
      FORMAT (no "safe"/"unsafe" label prefix). 4× improvement with 1 epoch.
      Still below 85% threshold — needs LoRA or format-focused training.

  - id: C-CHAT-TRAIN-003
    description: "Fix suggestions pass shellcheck"
    formal: "shellcheck_pass_rate > 0.85 on Type B responses"
    applies_to: all
    status: FAIL
    evidence: >
      Run 3 (3 epochs): No code blocks generated.
      Run 4 (1 epoch): 4 code blocks generated, 1 passed shellcheck (25.0%).
      Model generates bash code suggestions but shellcheck compliance is low.
      Improvement: code blocks are now coherent enough to be parsed.

  - id: C-CHAT-TRAIN-004
    description: "Rule citations match linter output"
    formal: "citation_accuracy > 0.90 on Type A responses"
    applies_to: all
    status: FAIL
    evidence: >
      Run 3 (3 epochs): 0% citation accuracy.
      Run 4 (1 epoch): 0% citation accuracy. Model discusses security concepts
      (injection, quoting, determinism) but doesn't cite specific rule IDs.
      The training data contains rule IDs but the model hasn't learned to reproduce them.

  - id: C-CHAT-TRAIN-005
    description: "Model weights are reasonable size"
    formal: "model_size_gb < 5"
    applies_to: all
    status: PASS
    evidence: "model.safetensors = 1.98GB (494M params, f32)"

kill_criteria:
  - id: KILL-CHAT-001
    condition: "Human review average < 2.5/5.0"
    action: "Ship classifier only. Chat model not ready."
    status: TRIGGERED
    evidence: >
      Run 4 (1 epoch) model generates coherent domain-relevant text.
      Classification accuracy 12.1% (4/33). Significant improvement over
      run 3 (3.0%) but still far below 85% threshold.
      Human review: ~2/5 — text is coherent and relevant but not structured.
      Decision: ship classifier only. Chat model needs LoRA adapter training
      to preserve base instruction-following while learning domain.

root_cause_analysis:
  - id: RCA-CHAT-001
    title: "entrenar does not serialize attention biases"
    status: FIXED
    description: >
      Qwen2 architecture uses biases on Q, K, V attention projections (72 tensors
      total, 3 per layer × 24 layers). entrenar's checkpoint serialization only
      saves weight matrices, not bias vectors.
    impact: "Model produces gibberish instead of coherent text"
    fix: "paiml/entrenar#258 (fixed in 24bc0c7)"

  - id: RCA-CHAT-002
    title: "entrenar config.json hardcodes LlamaForCausalLM"
    status: FIXED
    description: >
      save_config_and_metadata() hardcoded LlamaForCausalLM, model_type "llama",
      tie_word_embeddings false. Causes wrong model class on HF load.
    fix: "paiml/entrenar#259 (fixed in 533358f)"

  - id: RCA-CHAT-003
    title: "Bias tensors saved as 2D [1,N] instead of 1D [N]"
    status: OPEN
    description: >
      Attention biases stored as [1, hidden_size] instead of [hidden_size].
      HF transformers reports shape mismatch. Workaround: squeeze(0) post-process.
    fix: "paiml/entrenar#260"

  - id: RCA-CHAT-004
    title: "3 epochs of full fine-tuning causes catastrophic forgetting"
    status: OPEN
    description: >
      Full fine-tuning (all 494M params) on 17,942 samples:
      - Epoch 1: loss=1.52, ppl=4.56 (meaningful learning, optimal checkpoint)
      - Epoch 2: loss=3.88, ppl=48.39 (severe degradation)
      - Epoch 3: loss=4.01, ppl=55.40 (worse than random)
      Model memorizes training data in epoch 1, then forgets base capabilities.
      Output becomes repetitive degenerate patterns ("111...", "PerPer...").
    impact: "Model loses instruction-following and classification ability"
    fix: >
      Option A: Reduce to 1 epoch (stop before degradation).
      Option B: Use LoRA adapter-only training (freeze base weights).
      Option C: Add early stopping on validation loss.

falsification_tests:
  - id: FALSIFY-CHAT-001
    rule: "Training convergence"
    prediction: "Loss decreases monotonically across epochs"
    test: "Monitor train_loss per epoch"
    if_fails: "Learning rate too high or data quality issue"
    result: FALSIFIED
    evidence: >
      Run 3 (LR=5e-5, bias fix): Epoch 1 loss=1.52 (good convergence).
      Epoch 2 loss=3.88 (2.5× degradation). Epoch 3 loss=4.01 (continued decline).
      Loss increases after epoch 1 — catastrophic forgetting from full fine-tuning.
      1-epoch training is optimal for this data size (17K samples).

  - id: FALSIFY-CHAT-002
    rule: "No mode collapse"
    prediction: "Model generates diverse responses (not all identical)"
    test: "Check response diversity on 100 test prompts"
    if_fails: "Overfitting or insufficient data diversity"
    result: FALSIFIED
    evidence: >
      Run 1: Complete mode collapse ("222dkdkdk..." identical outputs).
      Run 3: Partial improvement — generates diverse but degenerate text.
      Output includes semi-coherent suggestions but degrades to repetitive
      patterns ("111...", "PerPerPer...", "closureclosure...").
      Mode collapse partially mitigated but not eliminated.

  - id: FALSIFY-CHAT-003
    rule: "Base model preserved"
    prediction: "Non-LoRA weights unchanged after training"
    test: "Compare base weight checksums before and after"
    if_fails: "Gradient leaking through frozen parameters"
    result: FALSIFIED
    evidence: >
      Full causal LM training (not adapter-only) — all 494M weights updated.
      Despite lora.enabled=true in YAML, entrenar performed full fine-tuning.
      This is the root cause of catastrophic forgetting.

  - id: FALSIFY-CHAT-004
    rule: "Honest limitations"
    prediction: "Model says 'I don't know' for out-of-scope queries"
    test: "Test with 10 non-shell prompts"
    if_fails: "System prompt not effective in constraining model"
    result: FALSIFIED
    evidence: >
      Run 3: Model attempts to answer all prompts but generates degenerate text.
      No "I don't know" responses. Base model instruction-following destroyed
      by 3 epochs of full fine-tuning.

benchmarks:
  training_run_1:
    note: "Without biases (entrenar#258 not yet fixed)"
    hardware: "RTX 4090, 24GB VRAM, CUDA 12.8"
    model: "Qwen2.5-Coder-0.5B-Instruct (494M params, f32)"
    throughput_avg: "4,578 tok/s"
    final_loss: 4.800
    best_loss: 0.764
    epoch_losses: [4.576, 4.980, 4.800]
  training_run_3:
    note: "With bias fix (entrenar#258) + config.json fix (#259), LR=5e-5"
    hardware: "RTX 4090, 24GB VRAM, CUDA 12.8"
    model: "Qwen2.5-Coder-0.5B-Instruct (494M params, f32)"
    throughput_avg: "5,190 tok/s"
    throughput_peak: "6,197 tok/s"
    mfu_avg: "18.6%"
    mfu_peak: "22.2%"
    vram_usage: "~10GB (f32 weights + optimizer states + activations)"
    step_time_avg: "~350ms per batch (seq_len=512, batch_size=4)"
    epoch_1_loss: 1.518
    epoch_1_perplexity: 4.56
    epoch_2_loss: 3.879
    epoch_2_perplexity: 48.39
    epoch_3_loss: 4.015
    epoch_3_perplexity: 55.40
    total_time: "5475s (91 min, 3 epochs)"
    best_loss: 0.630
    final_loss: 4.825
    insight: "Epoch 1 shows meaningful learning; epochs 2-3 cause catastrophic forgetting"
  training_run_4:
    note: "1-epoch training (optimal configuration found)"
    hardware: "RTX 4090, 24GB VRAM, CUDA 12.8"
    model: "Qwen2.5-Coder-0.5B-Instruct (494M params, f32)"
    throughput_avg: "4,400 tok/s"
    epoch_1_loss: 1.863
    epoch_1_perplexity: 6.44
    best_loss: 0.607
    final_loss: 2.671
    total_time: "2055s (34 min, 1 epoch)"
    insight: "1 epoch avoids catastrophic forgetting; model generates coherent domain text"
  inference:
    status: "FAIL — coherent domain text but missing classification format"
    tested_with: "HuggingFace transformers 5.3.0 (CPU, torch 2.10.0)"
    model_size: "1.98GB"
    run_3_accuracy: "3.0% (1/33, 3 epochs, degraded)"
    run_4_accuracy: "12.1% (4/33, 1 epoch, coherent)"
    run_4_shellcheck_rate: "25.0% (1/4 code blocks)"
    run_4_citation_rate: "0.0%"
    output_quality: >
      Run 4 (1 epoch): Coherent domain-relevant English. Discusses command injection,
      unquoted variables, non-deterministic operations. Generates numbered advice lists.
      Produces some code blocks. BUT: doesn't prefix with "safe"/"unsafe" label,
      doesn't cite specific rule IDs, some "potential potential" repetition.
      4× improvement over run 3 (3 epochs). Key bottleneck: response FORMAT, not CONTENT.
    bugs_fixed:
      - "entrenar#258: attention bias serialization (72 Qwen2 QKV bias tensors)"
      - "entrenar#259: config.json hardcoded LlamaForCausalLM instead of Qwen2ForCausalLM"
      - "entrenar#260: bias tensors saved as [1,N] instead of [N] (workaround: squeeze)"
