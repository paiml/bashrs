metadata:
  version: "1.1.0"
  description: "Chat model training — Qwen2.5-Coder-0.5B-Instruct LoRA fine-tuning on shell safety conversations"
  references:
    - "Hu et al. (2021) LoRA: Low-Rank Adaptation of Large Language Models"
    - "SSC v11 Section 7: Chat Model Fine-Tuning"
  depends_on:
    - "classifier-pipeline-v1"
    - "chat-inference-pipeline-v1"

equations:
  lora_forward:
    formula: "h = W_0 @ x + (alpha/rank) * B @ A @ x"
    domain: "x in R^{d_in}, W_0 in R^{d_out x d_in}, A in R^{rank x d_in}, B in R^{d_out x rank}"
    codomain: "R^{d_out}"
    invariants:
      - "Base weights W_0 are frozen (no gradient updates)"
      - "Only A, B matrices receive gradients"
      - "Effective rank << min(d_in, d_out)"

  chat_loss:
    formula: "L = -sum_t log P(y_t | y_{<t}, x) for response tokens only"
    domain: "x = prompt tokens, y = response tokens"
    codomain: "R (scalar loss)"
    invariants:
      - "Loss computed only on assistant response tokens (not system/user)"
      - "Cross-entropy with teacher forcing"

postconditions:
  - id: C-CHAT-TRAIN-001
    description: "Training converges — loss decreases over epochs"
    formal: "train_loss(epoch=3) < train_loss(epoch=1) * 0.8"
    applies_to: all
    status: FAIL
    evidence: >
      Run 1 (no biases): Loss 18.3 -> 4.8, plateau at ~5.0.
      Run 2 (with biases, LR=2e-4): Loss 18.2 -> 1.2, spike to ~4.5 (interrupted).
      Run 3 (with biases, LR=5e-5): Epoch 1 loss=1.52 (ppl=4.56, meaningful learning).
      Epoch 2 loss=3.88 (ppl=48.39, catastrophic forgetting). Epoch 3 in progress.
      C-CHAT-TRAIN-001 FAILS: epoch 3 loss > epoch 1 loss * 0.8.
      Root cause: full fine-tuning on 17K samples causes overfitting after 1 epoch.
      Fix: reduce to 1 epoch or use LoRA adapter-only training.

  - id: C-CHAT-TRAIN-002
    description: "Classification accuracy from parsed chat response exceeds 85%"
    formal: "accuracy > 0.85 on test set"
    applies_to: all
    status: FAIL
    evidence: >
      Model generates degenerate output ("222dkdkdk..." repetitive gibberish).
      Classification accuracy = 0% — no parseable safe/unsafe labels in output.
      Tested with HuggingFace transformers on 50-sample balanced test set.

  - id: C-CHAT-TRAIN-003
    description: "Fix suggestions pass shellcheck"
    formal: "shellcheck_pass_rate > 0.85 on Type B responses"
    applies_to: all
    status: FAIL
    evidence: "No parseable code blocks in model output — all responses are gibberish."

  - id: C-CHAT-TRAIN-004
    description: "Rule citations match linter output"
    formal: "citation_accuracy > 0.90 on Type A responses"
    applies_to: all
    status: FAIL
    evidence: "No coherent text in model output — no rule citations extractable."

  - id: C-CHAT-TRAIN-005
    description: "Model weights are reasonable size"
    formal: "model_size_gb < 5"
    applies_to: all
    status: PASS
    evidence: "model.safetensors = 1.98GB (494M params, f32)"

kill_criteria:
  - id: KILL-CHAT-001
    condition: "Human review average < 2.5/5.0"
    action: "Ship classifier only. Chat model not ready."
    status: TRIGGERED
    evidence: >
      Model output is degenerate gibberish — human review score would be 0/5.
      Decision: ship classifier only. Chat model requires entrenar bug fix
      (attention bias serialization) and retraining.

root_cause_analysis:
  - id: RCA-CHAT-001
    title: "entrenar does not serialize attention biases"
    description: >
      Qwen2 architecture uses biases on Q, K, V attention projections (72 tensors
      total, 3 per layer × 24 layers). entrenar's checkpoint serialization only
      saves weight matrices, not bias vectors. This means:
      1. During training, biases were likely zero-initialized (not loaded from base)
      2. Training optimized without proper bias initialization → corrupted gradients
      3. Saved checkpoint missing 72 bias tensors → degenerate inference
    impact: "Model produces gibberish instead of coherent text"
    fix: "paiml/entrenar#257 — serialize attention biases in safetensors checkpoint"
    verification: >
      Base Qwen2.5-Coder-0.5B-Instruct generates coherent text with same tokenizer
      and config. Fine-tuned checkpoint (even with base biases merged back) produces
      gibberish, confirming training itself was corrupted by missing biases.

falsification_tests:
  - id: FALSIFY-CHAT-001
    rule: "Training convergence"
    prediction: "Loss decreases monotonically across epochs"
    test: "Monitor train_loss per epoch"
    if_fails: "Learning rate too high or data quality issue"
    result: FALSIFIED
    evidence: >
      Loss decreased from 18.3 to ~1.0 (step 37) then rebounded to ~5.0.
      Epoch losses: 4.576/4.980/4.800 — no meaningful improvement after epoch 1.
      Loss plateau at ~5.0 indicates degenerate convergence.

  - id: FALSIFY-CHAT-002
    rule: "No mode collapse"
    prediction: "Model generates diverse responses (not all identical)"
    test: "Check response diversity on 100 test prompts"
    if_fails: "Overfitting or insufficient data diversity"
    result: FALSIFIED
    evidence: >
      All test outputs are identical repetitive gibberish patterns ("222dkdkdk...").
      Complete mode collapse to degenerate token sequences.

  - id: FALSIFY-CHAT-003
    rule: "Base model preserved"
    prediction: "Non-LoRA weights unchanged after training"
    test: "Compare base weight checksums before and after"
    if_fails: "Gradient leaking through frozen parameters"
    result: NOT_TESTED
    evidence: "Full causal LM training (not adapter-only) — all weights were updated."

  - id: FALSIFY-CHAT-004
    rule: "Honest limitations"
    prediction: "Model says 'I don't know' for out-of-scope queries"
    test: "Test with 10 non-shell prompts"
    if_fails: "System prompt not effective in constraining model"
    result: FALSIFIED
    evidence: "Model produces gibberish for all prompts, in-scope and out-of-scope."

benchmarks:
  training_run_1:
    note: "Without biases (entrenar#258 not yet fixed)"
    hardware: "RTX 4090, 24GB VRAM, CUDA 12.8"
    model: "Qwen2.5-Coder-0.5B-Instruct (494M params, f32)"
    throughput_avg: "4,578 tok/s"
    final_loss: 4.800
    best_loss: 0.764
    epoch_losses: [4.576, 4.980, 4.800]
  training_run_3:
    note: "With bias fix (entrenar#258) + config.json fix (#259), LR=5e-5"
    hardware: "RTX 4090, 24GB VRAM, CUDA 12.8"
    model: "Qwen2.5-Coder-0.5B-Instruct (494M params, f32)"
    throughput_avg: "5,190 tok/s"
    throughput_peak: "6,197 tok/s"
    mfu_avg: "18.6%"
    mfu_peak: "22.2%"
    vram_usage: "~10GB (f32 weights + optimizer states + activations)"
    step_time_avg: "~350ms per batch (seq_len=512, batch_size=4)"
    epoch_1_loss: 1.518
    epoch_1_perplexity: 4.56
    epoch_2_loss: 3.879
    epoch_2_perplexity: 48.39
    epoch_3_loss: "pending"
    insight: "Epoch 1 shows meaningful learning; epochs 2-3 show catastrophic forgetting"
  inference:
    status: "PENDING — evaluating run 3 model"
    tested_with: "HuggingFace transformers 5.3.0 (CPU, torch 2.10.0)"
    model_size: "1.98GB"
    bugs_fixed:
      - "entrenar#258: attention bias serialization (72 Qwen2 QKV bias tensors)"
      - "entrenar#259: config.json hardcoded LlamaForCausalLM instead of Qwen2ForCausalLM"
