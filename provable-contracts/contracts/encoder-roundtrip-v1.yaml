metadata:
  version: 1.0.0
  description: 'Provable escape function contracts (GH-183). The escape functions are the #1 defense against shell injection
    in emitted code. Every special character must be neutralized. A single unescaped metachar falsifies the contract.'
  references:
  - 'GH-183: KZ-11 Missing provable contracts'
  - 'CWE-78: OS Command Injection'
  - 'binding.yaml: encoder-roundtrip-v1 (5 bindings)'
equations:
  escape_roundtrip:
    formula: escape(escape(s)) == escape(s) (idempotent)
    domain: 's: arbitrary string (including shell metacharacters)'
    codomain: String (safe for shell evaluation)
    invariants:
    - Shell metacharacters ($, `, |, ;) are always neutralized
    - Empty strings produce valid shell output
proof_obligations:
- type: invariant
  property: Shell metacharacters ($, `, |, ;) are always neutralized
  formal: Shell metacharacters ($, `, |, ;) are always neutralized
  applies_to: all
- type: invariant
  property: Empty strings produce valid shell output
  formal: Empty strings produce valid shell output
  applies_to: all
invariants:
- Shell metacharacters ($, `, |, ;) are always neutralized in emitted code
- 'Escape roundtrip is idempotent: escape(escape(s)) == escape(s)'
- Empty strings produce valid shell output (not syntax errors)
- Variable names are sanitized to [A-Za-z0-9_]
falsification_tests:
- id: F-ESC-001
  rule: Shell metacharacters ($, `, |, ;) are always quoted
  prediction: escape_shell_string wraps input in quotes — metachar cannot execute
  test: 'Given input, verify: escape_shell_string wraps input in quotes — metachar cannot execute'
  if_fails: 'Contract violation: Shell metacharacters ($, `, |, ;) are always quoted'
- id: F-ESC-002
  rule: Empty string produces '' (not empty output)
  prediction: escape_shell_string('') == "''"
  test: escape_shell_string('') == "''"
  if_fails: 'Contract violation: Empty string produces '''' (not empty output)'
- id: F-ESC-003
  rule: Single quotes in input are safely escaped
  prediction: output uses '...''"'"''...' pattern — no unmatched quotes
  test: 'Given input, verify: output uses ''...''''"''"''''...'' pattern — no unmatched quotes'
  if_fails: 'Contract violation: Single quotes in input are safely escaped'
- id: F-ESC-004
  rule: Safe alphanumeric strings are passed through unquoted
  prediction: escape_shell_string('hello') == 'hello' (no unnecessary quoting)
  test: 'Given input, verify: escape_shell_string(''hello'') == ''hello'' (no unnecessary quoting)'
  if_fails: 'Contract violation: Safe alphanumeric strings are passed through unquoted'
- id: F-ESC-005
  rule: Newlines are quoted (prevent command injection via newline)
  prediction: output is single-quoted — newline cannot split commands
  test: 'Given input, verify: output is single-quoted — newline cannot split commands'
  if_fails: 'Contract violation: Newlines are quoted (prevent command injection via newline)'
- id: F-ESC-006
  rule: Unicode/bidi characters are always quoted (CVE-2021-42574)
  prediction: non-ASCII input is single-quoted — bidi attack neutralized
  test: 'Given input, verify: non-ASCII input is single-quoted — bidi attack neutralized'
  if_fails: 'Contract violation: Unicode/bidi characters are always quoted (CVE-2021-42574)'
- id: F-ESC-007
  rule: Valid shell identifier passes through unchanged
  prediction: escape_variable_name('my_var_123') == 'my_var_123'
  test: 'Given input, verify: escape_variable_name(''my_var_123'') == ''my_var_123'''
  if_fails: 'Contract violation: Valid shell identifier passes through unchanged'
- id: F-ESC-008
  rule: Hyphens in variable names replaced with underscores
  prediction: escape_variable_name('my-var') == 'my_var'
  test: 'Given input, verify: escape_variable_name(''my-var'') == ''my_var'''
  if_fails: 'Contract violation: Hyphens in variable names replaced with underscores'
- id: F-ESC-009
  rule: Leading digit replaced with underscore (POSIX requirement)
  prediction: result starts with _ not digit
  test: 'Given input, verify: result starts with _ not digit'
  if_fails: 'Contract violation: Leading digit replaced with underscore (POSIX requirement)'
- id: F-ESC-010
  rule: Injection attempt in variable name is sanitized
  prediction: all non-identifier chars become underscores
  test: 'Given input, verify: all non-identifier chars become underscores'
  if_fails: 'Contract violation: Injection attempt in variable name is sanitized'
- id: F-ESC-011
  rule: Simple command name passes through
  prediction: escape_command_name('ls') == 'ls'
  test: 'Given input, verify: escape_command_name(''ls'') == ''ls'''
  if_fails: 'Contract violation: Simple command name passes through'
- id: F-ESC-012
  rule: Path command name passes through
  prediction: escape_command_name('/usr/bin/grep') == '/usr/bin/grep'
  test: 'Given input, verify: escape_command_name(''/usr/bin/grep'') == ''/usr/bin/grep'''
  if_fails: 'Contract violation: Path command name passes through'
- id: F-ESC-013
  rule: Command name with spaces is escaped
  prediction: output is quoted — space cannot cause argument splitting
  test: 'Given input, verify: output is quoted — space cannot cause argument splitting'
  if_fails: 'Contract violation: Command name with spaces is escaped'
- id: F-ESC-014
  rule: Command name with shell metachar is escaped
  prediction: output is quoted — semicolon cannot inject second command
  test: 'Given input, verify: output is quoted — semicolon cannot inject second command'
  if_fails: 'Contract violation: Command name with shell metachar is escaped'
kani_harnesses:
- id: KANI-ENCODER_ROUNDTRIP-001
  obligation: Shell metacharacters ($, `, |, ;) are always neutralized
  property: Shell metacharacters ($, `, |, ;) are always neutralized
  bound: 4
  strategy: stub_float
  harness: verify_encoder_roundtrip_invariant
