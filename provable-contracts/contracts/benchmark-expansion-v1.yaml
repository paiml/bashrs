metadata:
  version: 1.0.0
  description: ShellSafetyBench expansion generator (PMAT-176) produces valid, deterministic, linter-consistent labeled entries
    for Bash, Makefile, and Dockerfile formats.
  references:
  - 'SSC v12 Phase 9 #10: Expand ShellSafetyBench to 50K+ entries'
equations:
  expansion_balance:
    formula: 'forall fmt in {Bash, Makefile, Dockerfile}: safe_count(expand(fmt, n, seed)) > 0 AND unsafe_count(expand(fmt,
      n, seed)) > 0'
    domain: 'format: CorpusFormat, n: usize, seed: u64'
    codomain: Vec<CorpusEntry> with balanced labels
    invariants:
    - Both safe and unsafe labels present for each format
    - Same seed produces identical output
proof_obligations:
- type: invariant
  property: Both safe and unsafe labels present for each format
  formal: Both safe and unsafe labels present for each format
  applies_to: all
- type: invariant
  property: Same seed produces identical output
  formal: Same seed produces identical output
  applies_to: all
falsification_tests:
- id: F-EXPAND-001
  rule: Bash expansion has both safe and unsafe labels
  prediction: generate_expansion(Bash, 100, 42) has safe_count > 0 AND unsafe_count > 0
  test: 'Verify: generate_expansion(Bash, 100, 42) has safe_count > 0 AND unsafe_count > 0'
  if_fails: 'Contract violation: Bash expansion has both safe and unsafe labels'
- id: F-EXPAND-002
  rule: Makefile expansion has both safe and unsafe labels
  prediction: generate_expansion(Makefile, 100, 42) has safe_count > 0 AND unsafe_count > 0
  test: 'Verify: generate_expansion(Makefile, 100, 42) has safe_count > 0 AND unsafe_count > 0'
  if_fails: 'Contract violation: Makefile expansion has both safe and unsafe labels'
- id: F-EXPAND-003
  rule: Dockerfile expansion has both safe and unsafe labels
  prediction: generate_expansion(Dockerfile, 100, 42) has safe_count > 0 AND unsafe_count > 0
  test: 'Verify: generate_expansion(Dockerfile, 100, 42) has safe_count > 0 AND unsafe_count > 0'
  if_fails: 'Contract violation: Dockerfile expansion has both safe and unsafe labels'
- id: F-EXPAND-004
  rule: 'Deterministic: same seed produces identical output'
  prediction: generate_expansion(Bash, 50, 42) == generate_expansion(Bash, 50, 42)
  test: 'Verify: generate_expansion(Bash, 50, 42) == generate_expansion(Bash, 50, 42)'
  if_fails: 'Contract violation: Deterministic: same seed produces identical output'
- id: F-EXPAND-005
  rule: Different seeds produce different output
  prediction: generate_expansion(Bash, 50, 42) != generate_expansion(Bash, 50, 99)
  test: 'Verify: generate_expansion(Bash, 50, 42) != generate_expansion(Bash, 50, 99)'
  if_fails: 'Contract violation: Different seeds produce different output'
- id: F-EXPAND-006
  rule: Labels agree with linter (label matches lint result)
  prediction: 'for all entries: entry.label == label_script(entry.input, format)'
  test: 'Verify: for all entries: entry.label == label_script(entry.input, format)'
  if_fails: 'Contract violation: Labels agree with linter (label matches lint result)'
- id: F-EXPAND-007
  rule: JSONL round-trip preserves data
  prediction: write_jsonl(entries) then read_jsonl produces identical entries
  test: 'Verify: write_jsonl(entries) then read_jsonl produces identical entries'
  if_fails: 'Contract violation: JSONL round-trip preserves data'
kani_harnesses:
- id: KANI-BENCHMARK_EXPANSION-001
  obligation: Both safe and unsafe labels present for each format
  property: Both safe and unsafe labels present for each format
  bound: 4
  strategy: stub_float
  harness: verify_benchmark_expansion_invariant
