metadata:
  version: 1.0.0
  description: 'Falsification contract: verify trueno NF4 codebook mapping matches bitsandbytes. Root cause of 3.64 loss gap
    at step 1 (15.50 vs 11.86). See trueno#195, ENT-285, arXiv:2305.14314 (QLoRA, Dettmers et al. 2023).'
  references:
  - 'arXiv:2305.14314 — QLoRA: Efficient Finetuning of Quantized LLMs'
  - trueno#195 — NF4 codebook mapping incompatible with bitsandbytes
  - entrenar#298 — NF4 weight loading uses wrong codebook mapping
equations:
  nf4_quantization:
    formula: dequant(quant(x, codebook), codebook) ~= x within tolerance
    domain: 'x in R, codebook: [f32; 16] (NF4 codebook values)'
    codomain: R (reconstructed value)
    invariants:
    - Codebook matches reference NormalFloat4 values
    - Quantization error bounded by max bin width
proof_obligations:
- type: invariant
  property: Codebook matches reference NormalFloat4 values
  formal: Codebook matches reference NormalFloat4 values
  applies_to: all
- type: invariant
  property: Quantization error bounded by max bin width
  formal: Quantization error bounded by max bin width
  applies_to: all
falsification_tests:
- id: FALSIFY-NF4-001
  description: 'trueno NF4_LUT[0..15] values must match bitsandbytes create_normal_map() non-zero entries in order. Values
    identical, mapping must agree.

    '
  prediction: FAIL
  if_fails: Codebook values diverge — trueno uses different quantile computation
  severity: critical
  rule: NF4 codebook values match bitsandbytes
  test: 'Verify: FAIL'
- id: FALSIFY-NF4-002
  description: 'Given a weight value w, quantize with trueno and bitsandbytes independently. The resulting nibble value must
    be identical for all 16 codebook entries. If nibble 8 in trueno maps to 0.0796 but nibble 8 in bnb maps to 0.0, the encoding
    is incompatible.

    '
  prediction: FAIL
  if_fails: Nibble encoding differs — trueno quantizes weights to different nibble indices than bitsandbytes
  severity: critical
  rule: NF4 nibble encoding matches bitsandbytes packing
  test: 'Verify: FAIL'
- id: FALSIFY-NF4-003
  description: 'Load the same safetensors weight (e.g., model.layers.0.self_attn.q_proj.weight), quantize to NF4 with both
    trueno and bitsandbytes, then dequantize. Max absolute difference must be < 0.01.

    '
  prediction: FAIL
  if_fails: Dequantized weights diverge > 0.01 — confirms the codebook mapping bug
  severity: critical
  rule: 'Dequantized weight parity: trueno vs bitsandbytes'
  test: 'Verify: FAIL'
- id: FALSIFY-NF4-004
  description: 'After fixing the codebook mapping (trueno#195), run a single forward pass with identical inputs. Loss must
    match PyTorch within 0.5 (11.86 ± 0.5). Current entrenar loss: 15.50 (gap: 3.64).

    '
  prediction: PASS_AFTER_FIX
  if_fails: Additional forward pass bugs beyond codebook mapping
  severity: high
  rule: Forward pass loss parity after codebook fix
  test: 'Verify: PASS_AFTER_FIX'
- id: FALSIFY-NF4-005
  description: 'The 74x throughput gap (15.5 vs 1150 tok/s) is independent of codebook mapping. This is a kernel performance
    issue (NF4 scalar dequant vs cuBLAS), not a correctness issue.

    '
  prediction: PASS
  if_fails: Throughput gap has additional causes beyond kernel performance
  severity: medium
  rule: Throughput gap is NOT caused by codebook mapping
  test: 'Verify: PASS'
kani_harnesses:
- id: KANI-NF4_CODEBOOK_PARITY-001
  obligation: Codebook matches reference NormalFloat4 values
  property: Codebook matches reference NormalFloat4 values
  bound: 4
  strategy: stub_float
  harness: verify_nf4_codebook_parity_invariant
