metadata:
  version: 1.0.0
  verification_level: L5
  description: Transpiler stdlib functions (GH-148) produce correct POSIX shell output. capture() → $(...), exit() → exit
    N, sleep() → sleep N.
  verification_command: cargo test -p bashrs --lib -- stdlib
  references:
  - 'GH-148: rash transpiler missing stdlib for real-world shell scripts'
  depends_on:
  - transpiler-core-v1
  - encoder-roundtrip-v1
kernel_structure:
  phases:
  - name: Function recognition
    description: is_stdlib_function() checks static match table for known Rust function names (capture, exit, sleep, glob, mkdir, chmod, mv, string_starts_with, string_ends_with)
    invariant: Known functions always recognized, unknown functions produce clear error
  - name: Shell emission
    description: Each matched function has a codegen path emitting the POSIX shell equivalent (capture to $(), exit to exit N, glob to unquoted pattern)
    invariant: Emitted shell commands are behaviorally equivalent to Rust originals
  - name: Dead code elimination
    description: Only stdlib functions actually used in the program are emitted as runtime helper definitions
    invariant: Unused helpers never appear in output
equations:
  stdlib_mapping:
    formula: map_stdlib(rust_fn) -> shell_equivalent where behavior(rust_fn) ~= behavior(shell_equivalent)
    domain: 'rust_fn: Rust std function (fs::read_to_string, env::var, etc.)'
    codomain: String (shell command equivalent)
    invariants:
    - All mapped functions produce equivalent behavior
    - Unmapped functions produce clear error
proof_obligations:
- type: invariant
  property: All mapped functions produce equivalent behavior
  formal: All mapped functions produce equivalent behavior
  tolerance: 0.0
  applies_to: all
- type: invariant
  property: Unmapped functions produce clear error
  formal: Unmapped functions produce clear error
  tolerance: 0.0
  applies_to: all
invariants:
- capture() produces $(...) command substitution in assignment context
- exit(N) produces 'exit N' as standalone statement
- sleep(N) produces 'sleep N' as standalone statement
- glob('pattern') emits unquoted pattern for shell expansion
- mkdir/chmod/mv produce correct POSIX commands
falsification_tests:
- id: F-STDLIB-001
  rule: capture('whoami') produces $(whoami) in assignment context
  prediction: transpiled output contains 'user="$(whoami)"'
  test: 'Given input, verify: transpiled output contains ''user="$(whoami)"'''
  if_fails: 'Contract violation: capture(''whoami'') produces $(whoami) in assignment context'
- id: F-STDLIB-002
  rule: exit(0) produces 'exit 0' as standalone statement
  prediction: transpiled output contains 'exit 0'
  test: 'Given input, verify: transpiled output contains ''exit 0'''
  if_fails: 'Contract violation: exit(0) produces ''exit 0'' as standalone statement'
- id: F-STDLIB-003
  rule: sleep(5) produces 'sleep 5' as standalone statement
  prediction: transpiled output contains 'sleep 5'
  test: 'Given input, verify: transpiled output contains ''sleep 5'''
  if_fails: 'Contract violation: sleep(5) produces ''sleep 5'' as standalone statement'
- id: F-STDLIB-004
  rule: capture('date +%Y') splits program from args correctly
  prediction: transpiled output contains '$(date' and program is not single-quoted
  test: 'Given input, verify: transpiled output contains ''$(date'' and program is not single-quoted'
  if_fails: 'Contract violation: capture(''date +%Y'') splits program from args correctly'
- id: F-STDLIB-005
  rule: capture/exit/sleep are recognized as stdlib functions
  prediction: is_stdlib_function('capture') AND is_stdlib_function('exit') AND is_stdlib_function('sleep')
  test: is_stdlib_function('capture') AND is_stdlib_function('exit') AND is_stdlib_function('sleep')
  if_fails: 'Contract violation: capture/exit/sleep are recognized as stdlib functions'
- id: F-STDLIB-006
  rule: exit(1) produces non-zero exit code
  prediction: transpiled output contains 'exit 1'
  test: 'Given input, verify: transpiled output contains ''exit 1'''
  if_fails: 'Contract violation: exit(1) produces non-zero exit code'
- id: F-STDLIB-007
  rule: glob('*.txt') in for-in loop produces unquoted shell pattern
  prediction: transpiled output contains 'for' and '*.txt' unquoted (not '*.txt' or "*.txt")
  test: 'Given input, verify: transpiled output contains ''for'' and ''*.txt'' unquoted (not ''*.txt'' or "*.txt")'
  if_fails: 'Contract violation: glob(''*.txt'') in for-in loop produces unquoted shell pattern'
- id: F-STDLIB-008
  rule: glob('/etc/*.conf') preserves directory prefix in pattern
  prediction: transpiled output contains '/etc/*.conf' unquoted
  test: 'Given input, verify: transpiled output contains ''/etc/*.conf'' unquoted'
  if_fails: 'Contract violation: glob(''/etc/*.conf'') preserves directory prefix in pattern'
- id: F-STDLIB-009
  rule: glob() is recognized as stdlib function
  prediction: is_stdlib_function('glob') returns true
  test: is_stdlib_function('glob') returns true
  if_fails: 'Contract violation: glob() is recognized as stdlib function'
- id: F-STDLIB-010
  rule: mkdir(path) produces 'mkdir -p path' (idempotent)
  prediction: transpiled output contains 'mkdir' and '-p' and '/tmp/mydir'
  test: 'Given input, verify: transpiled output contains ''mkdir'' and ''-p'' and ''/tmp/mydir'''
  if_fails: 'Contract violation: mkdir(path) produces ''mkdir -p path'' (idempotent)'
- id: F-STDLIB-011
  rule: mv(src, dst) produces 'mv src dst
  prediction: transpiled output contains 'mv' and both paths
  test: 'Given input, verify: transpiled output contains ''mv'' and both paths'
  if_fails: 'Contract violation: mv(src, dst) produces ''mv src dst'
- id: F-STDLIB-012
  rule: chmod(mode, path) produces 'chmod mode path
  prediction: transpiled output contains 'chmod 755 /tmp/script.sh'
  test: 'Given input, verify: transpiled output contains ''chmod 755 /tmp/script.sh'''
  if_fails: 'Contract violation: chmod(mode, path) produces ''chmod mode path'
- id: F-STDLIB-013
  rule: string_starts_with emits POSIX case-based prefix check
  prediction: transpiled output contains rash_string_starts_with runtime function with case pattern
  test: 'Given input, verify: transpiled output contains rash_string_starts_with runtime function with case pattern'
  if_fails: 'Contract violation: string_starts_with emits POSIX case-based prefix check'
- id: F-STDLIB-014
  rule: string_ends_with emits POSIX case-based suffix check
  prediction: transpiled output contains rash_string_ends_with runtime function with case pattern
  test: 'Given input, verify: transpiled output contains rash_string_ends_with runtime function with case pattern'
  if_fails: 'Contract violation: string_ends_with emits POSIX case-based suffix check'
- id: F-STDLIB-015
  rule: starts_with/ends_with selectively emitted (dead code elim...
  prediction: output contains rash_string_starts_with but NOT rash_string_ends_with
  test: 'Given input, verify: output contains rash_string_starts_with but NOT rash_string_ends_with'
  if_fails: 'Contract violation: starts_with/ends_with selectively emitted (dead code elim...'
- id: F-STDLIB-016
  rule: capture() with pipe operator preserves pipeline via sh -c
  prediction: transpiled output contains $(sh ... 'ls /tmp | wc -l') — pipe not escaped
  test: 'Given input, verify: transpiled output contains $(sh ... ''ls /tmp | wc -l'') — pipe not escaped'
  if_fails: 'Contract violation: capture() with pipe operator preserves pipeline via sh -c'
- id: F-STDLIB-017
  rule: capture() without pipes still uses direct command substit...
  prediction: transpiled output contains $(whoami) — no sh -c wrapper
  test: 'Given input, verify: transpiled output contains $(whoami) — no sh -c wrapper'
  if_fails: 'Contract violation: capture() without pipes still uses direct command substit...'
- id: F-STDLIB-018
  rule: capture() with && operator uses sh -c wrapper
  prediction: transpiled output wraps command in sh -c to preserve &&
  test: 'Given input, verify: transpiled output wraps command in sh -c to preserve &&'
  if_fails: 'Contract violation: capture() with && operator uses sh -c wrapper'
kani_harnesses:
- id: KANI-TRANSPILER_STDLIB-001
  obligation: All mapped functions produce equivalent behavior
  property: All mapped functions produce equivalent behavior
  bound: 4
  strategy: stub_float
  harness: verify_transpiler_stdlib_behavioral_equiv
- id: KANI-TRANSPILER_STDLIB-002
  obligation: Unmapped functions produce clear error
  property: Unmapped functions produce clear error
  bound: 4
  strategy: stub_float
  harness: verify_transpiler_stdlib_unmapped_error
- id: KANI-TRANSPILER_STDLIB-003
  obligation: capture() produces $(...) command substitution in assignment context
  property: capture() produces $(...) command substitution in assignment context
  bound: 4
  strategy: stub_float
  harness: verify_transpiler_stdlib_capture_subst
- id: KANI-TRANSPILER_STDLIB-004
  obligation: glob() emits unquoted pattern for shell expansion
  property: glob(pattern) emits unquoted pattern for shell expansion
  bound: 4
  strategy: stub_float
  harness: verify_transpiler_stdlib_glob_unquoted
- id: KANI-TRANSPILER_STDLIB-005
  obligation: mkdir/chmod/mv produce correct POSIX commands
  property: mkdir/chmod/mv produce correct POSIX commands
  bound: 4
  strategy: stub_float
  harness: verify_transpiler_stdlib_fs_commands
