metadata:
  version: 1.0.0
  verification_level: L5
  description: Provable Dockerfile and Makefile linter contracts (GH-183). DOCKER rules detect container security/quality
    issues. MAKE rules detect non-deterministic, non-idempotent, and unsafe patterns. Each rule must detect known-bad and
    not false-positive on known-safe.
  verification_command: cargo test -p bashrs --lib -- docker
  references:
  - 'GH-183: KZ-11 Missing provable contracts'
  - hadolint best practices (DOCKER rules)
  depends_on:
  - linter-coverage-v1
  - linter-det-idem-v1
kernel_structure:
  phases:
  - name: Line scanning
    description: Split input into lines and classify format (Dockerfile or Makefile)
    invariant: Every line is visited exactly once
  - name: Dockerfile rule matching
    description: DOCKER001-006 rules scan for security and quality issues using line-prefix matching (FROM, ADD, USER, HEALTHCHECK)
    invariant: Known-bad patterns always detected (soundness), known-safe patterns never flagged (precision)
  - name: Makefile rule matching
    description: MAKE001-004 rules detect non-deterministic wildcards, non-idempotent operations, and missing .PHONY using regex matching
    invariant: $(wildcard) without $(sort) always detected, mkdir -p never flagged
equations:
  multi_format_linting:
    formula: lint(file, fmt) produces diagnostics where fmt in {Dockerfile, Makefile}
    domain: 'file: String, fmt: {Dockerfile, Makefile}'
    codomain: Vec<LintDiagnostic>
    invariants:
    - Dockerfile rules fire on known-bad Dockerfiles
    - Makefile rules fire on known-bad Makefiles
proof_obligations:
- type: invariant
  property: Dockerfile rules fire on known-bad Dockerfiles
  formal: Dockerfile rules fire on known-bad Dockerfiles
  tolerance: 0.0
  applies_to: all
- type: invariant
  property: Makefile rules fire on known-bad Makefiles
  formal: Makefile rules fire on known-bad Makefiles
  tolerance: 0.0
  applies_to: all
invariants:
- DOCKER rules detect container security issues (root user, unpinned images)
- DOCKER rules do NOT flag Dockerfiles with proper USER/pinned images
- MAKE rules detect non-deterministic wildcards and non-idempotent operations
- MAKE rules do NOT flag $(sort $(wildcard)) or mkdir -p
falsification_tests:
- id: F-DOCKER001-SOUND
  rule: DOCKER001 detects Dockerfile running as root
  prediction: lint result contains DOCKER001
  test: 'Given input, verify: lint result contains DOCKER001'
  if_fails: 'Contract violation: DOCKER001 detects Dockerfile running as root'
- id: F-DOCKER001-PRECISE
  rule: DOCKER001 does NOT flag Dockerfile with USER directive
  prediction: lint result does NOT contain DOCKER001
  test: 'Given input, verify: lint result does NOT contain DOCKER001'
  if_fails: 'Contract violation: DOCKER001 does NOT flag Dockerfile with USER directive'
- id: F-DOCKER002-SOUND
  rule: DOCKER002 detects :latest tag
  prediction: lint result contains DOCKER002
  test: 'Given input, verify: lint result contains DOCKER002'
  if_fails: 'Contract violation: DOCKER002 detects :latest tag'
- id: F-DOCKER002-PRECISE
  rule: DOCKER002 does NOT flag sha256-pinned image
  prediction: lint result does NOT contain DOCKER002
  test: 'Given input, verify: lint result does NOT contain DOCKER002'
  if_fails: 'Contract violation: DOCKER002 does NOT flag sha256-pinned image'
- id: F-DOCKER006-SOUND
  rule: DOCKER006 detects ADD used for local files
  prediction: lint result contains DOCKER006
  test: 'Given input, verify: lint result contains DOCKER006'
  if_fails: 'Contract violation: DOCKER006 detects ADD used for local files'
- id: F-DOCKER006-PRECISE
  rule: DOCKER006 does NOT flag COPY
  prediction: lint result does NOT contain DOCKER006
  test: 'Given input, verify: lint result does NOT contain DOCKER006'
  if_fails: 'Contract violation: DOCKER006 does NOT flag COPY'
- id: F-MAKE001-SOUND
  rule: MAKE001 detects $(wildcard) without $(sort)
  prediction: lint result contains MAKE001
  test: 'Given input, verify: lint result contains MAKE001'
  if_fails: 'Contract violation: MAKE001 detects $(wildcard) without $(sort)'
- id: F-MAKE001-PRECISE
  rule: MAKE001 does NOT flag $(sort $(wildcard))
  prediction: lint result does NOT contain MAKE001
  test: 'Given input, verify: lint result does NOT contain MAKE001'
  if_fails: 'Contract violation: MAKE001 does NOT flag $(sort $(wildcard))'
- id: F-MAKE002-SOUND
  rule: MAKE002 detects mkdir without -p in recipe
  prediction: lint result contains MAKE002
  test: 'Given input, verify: lint result contains MAKE002'
  if_fails: 'Contract violation: MAKE002 detects mkdir without -p in recipe'
- id: F-MAKE002-PRECISE
  rule: MAKE002 does NOT flag mkdir -p
  prediction: lint result does NOT contain MAKE002
  test: 'Given input, verify: lint result does NOT contain MAKE002'
  if_fails: 'Contract violation: MAKE002 does NOT flag mkdir -p'
- id: F-MAKE004-SOUND
  rule: MAKE004 detects target without .PHONY
  prediction: lint result contains MAKE004
  test: 'Given input, verify: lint result contains MAKE004'
  if_fails: 'Contract violation: MAKE004 detects target without .PHONY'
- id: F-MAKE004-PRECISE
  rule: MAKE004 does NOT flag .PHONY target
  prediction: lint result does NOT contain MAKE004
  test: 'Given input, verify: lint result does NOT contain MAKE004'
  if_fails: 'Contract violation: MAKE004 does NOT flag .PHONY target'
kani_harnesses:
- id: KANI-LINTER_DOCKER_MAKE-001
  obligation: Dockerfile rules fire on known-bad Dockerfiles
  property: Dockerfile rules fire on known-bad Dockerfiles
  bound: 4
  strategy: stub_float
  harness: verify_linter_dockerfile_soundness
- id: KANI-LINTER_DOCKER_MAKE-002
  obligation: Makefile rules fire on known-bad Makefiles
  property: Makefile rules fire on known-bad Makefiles
  bound: 4
  strategy: stub_float
  harness: verify_linter_makefile_soundness
- id: KANI-LINTER_DOCKER_MAKE-003
  obligation: DOCKER rules do NOT flag Dockerfiles with proper USER/pinned images
  property: DOCKER rules do NOT flag Dockerfiles with proper USER/pinned images
  bound: 4
  strategy: stub_float
  harness: verify_linter_dockerfile_precision
- id: KANI-LINTER_DOCKER_MAKE-004
  obligation: MAKE rules do NOT flag $(sort $(wildcard)) or mkdir -p
  property: MAKE rules do NOT flag $(sort $(wildcard)) or mkdir -p
  bound: 4
  strategy: stub_float
  harness: verify_linter_makefile_precision
