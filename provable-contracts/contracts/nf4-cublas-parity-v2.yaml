contract:
  name: nf4-cublas-parity-v2
  version: "2.0.0"
  description: >
    Falsification contract for NF4 cuBLAS GEMM parity (ENT-287).
    Five cuBLAS integration attempts produced loss=0.0. This contract
    isolates the failure to a SINGLE projection GEMM, not the full model.
    Source: bitsandbytes csrc/kernels.cu (NF4 dequant + matmul4bit).
  spec: docs/specifications/shell-safety-inference.md
  section: "S18"
  references:
    - "bitsandbytes csrc/kernels.cu:520-521 — NF4 nibble order (HIGH then LOW)"
    - "bitsandbytes autograd/_functions.py:320 — dequant().to(dtype).t() then linear"
    - "trueno nf4_cpu.rs:173-174 — LOW then HIGH (opposite of bnb)"
    - "arXiv:2305.14314 — QLoRA"
    - "entrenar#300 — ENT-287 cuBLAS integration"

tests:
  - id: FALSIFY-PARITY-V2-001
    name: "Single q_proj GEMM: fused NF4 vs cuBLAS on dequantized weights"
    description: >
      Load Qwen3-4B q_proj weight [4096, 2560]. Quantize to NF4.
      Create random activation A[4, 2560].
      Run fused NF4 kernel: C_fused = gemm_nf4_forward(A, nf4, scales).
      Dequantize, transpose [4096,2560]→[2560,4096], run cuBLAS:
      C_cublas = gemm_forward(A, W_t).
      Max |C_fused - C_cublas| must be < 0.1.
    prediction: PASS
    if_fails: >
      Dequantization or transpose produces wrong values. Debug:
      (a) print first 10 values of W_t and verify against W_fused
      (b) print first 10 output values from each path
      (c) check cuBLAS return code
    severity: critical

  - id: FALSIFY-PARITY-V2-002
    name: "Nibble unpack order: trueno vs bitsandbytes"
    description: >
      bitsandbytes: HIGH nibble → even index, LOW nibble → odd index
      (kernels.cu:520-521).
      trueno: LOW nibble → even index, HIGH nibble → odd index
      (nf4_cpu.rs:173-174).
      This means dequantize_nf4() outputs values in DIFFERENT order than
      what bitsandbytes would produce from the same packed bytes.
      For self-consistent trueno quantize→dequantize, this doesn't matter.
      For loading bnb-quantized weights, it would swap every pair.
      Test: quantize a known vector with trueno, dequantize, verify
      round-trip matches original within NF4 tolerance.
    prediction: PASS
    if_fails: "trueno round-trip has unexpected error > 0.16 per element"
    severity: medium

  - id: FALSIFY-PARITY-V2-003
    name: "GpuBuffer from_host upload verifiable"
    description: >
      Upload a known f32 vector [1.0, 2.0, 3.0, ...] via from_host.
      Download via copy_to_host. Verify exact match.
      If this fails, the GPU buffer is zero-initialized or corrupt.
    prediction: PASS
    if_fails: "GPU memory transfer bug — from_host doesn't actually copy data"
    severity: critical

  - id: FALSIFY-PARITY-V2-004
    name: "cuBLAS gemm_f32 produces correct output for known input"
    description: >
      A = [[1,0],[0,1]] (identity 2x2), B = [[3,4],[5,6]].
      C = A @ B should be [[3,4],[5,6]].
      Run via cublas.gemm_f32 and verify exact match.
    prediction: PASS
    if_fails: "cuBLAS GEMM itself is broken — check handle, stream, compute type"
    severity: critical

  - id: FALSIFY-PARITY-V2-005
    name: "Full forward pass output is non-zero"
    description: >
      Load model, run one forward pass with cuBLAS weights,
      verify output logits are not all zero.
      This is the end-to-end test that previous attempts failed.
    prediction: FAIL_UNTIL_FIXED
    if_fails: "cuBLAS GEMM path still produces zeros — parity tests above should isolate which component"
    severity: critical
