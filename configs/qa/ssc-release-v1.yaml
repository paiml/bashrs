# configs/qa/ssc-release-v1.yaml — ShellSafetyBench release quality gate
#
# Executed via: apr qa --checklist configs/qa/ssc-release-v1.yaml
# All checks must pass before publishing to HuggingFace.
#
# Phase 1 (pre-training) gates: data quality, pipeline, contracts
# Phase 2 (post-training) gates: model eval, baselines, static/dynamic gap

name: ssc-release-v1
description: "ShellSafetyBench release quality gate (v12.5)"
version: "2.0"

checks:
  # ── Phase 1: Pre-Training Gates (can validate now) ──

  - name: pipeline-ready
    description: "Pipeline preflight passes (all required tools available)"
    command: "bashrs corpus pipeline-check --json"
    gate:
      field: pipeline_ready
      op: "=="
      value: true

  - name: contracts-valid
    description: "All provable contracts have matching tests"
    command: "test -f provable-contracts/contracts/shellsafetybench-v1.yaml"

  - name: cwe-mapping-complete
    description: "14 linter rules mapped to CWE IDs"
    command: "bashrs corpus cwe-mapping --json"
    gate:
      field: total_rules
      op: ">="
      value: 14

  - name: merged-data-exists
    description: "Merged training data exists with >20K entries"
    command: "wc -l < training/shellsafetybench/merged-training.jsonl"
    gate:
      field: stdout
      op: ">="
      value: 20000

  - name: splits-exist
    description: "Train/val/test splits exist"
    command: "test -f training/shellsafetybench/splits/train.jsonl && test -f training/shellsafetybench/splits/test.jsonl"

  - name: class-balance
    description: "Unsafe class is >5% of training data (not extreme imbalance)"
    command: "bashrs corpus export-splits --input training/shellsafetybench/merged-training.jsonl --output /tmp/qa-splits-check"

  - name: verificar-mutations
    description: "Verificar CWE-targeted mutations exist"
    command: "test -f training/shellsafetybench/verificar-labeled.jsonl"

  - name: eval-harness-weights
    description: "Eval harness weights sum to 1.0"
    command: "bashrs corpus eval-benchmark --predictions /dev/null 2>&1 || true"

  # ── Phase 2: Post-Training Gates (require model) ──

  - name: dataset-quality
    description: "Training data passes alimentar quality check"
    command: >
      apr data audit training/shellsafetybench/splits/train.jsonl --json
    gate:
      field: valid_json_pct
      op: ">="
      value: 99.0

  - name: static-eval-detection-f1
    description: "Detection F1 on static test set >= 0.50"
    command: "cat training/shellsafetybench/eval/static-results.json"
    gate:
      field: detection_f1
      op: ">="
      value: 0.50

  - name: beats-keyword-baseline
    description: "Model MCC exceeds keyword baseline MCC"
    command: "cat training/shellsafetybench/eval/baselines.json"
    gate:
      field: model_mcc_vs_keyword
      op: ">"
      value: 0

  - name: static-dynamic-gap
    description: "Gap between static and dynamic eval < 15% (anti-overfitting)"
    command: "cat training/shellsafetybench/eval/dynamic-results.json"
    gate:
      field: static_dynamic_gap
      op: "<="
      value: 0.15

  - name: model-card-exists
    description: "Model card README exists"
    command: "bashrs corpus model-card --output /dev/null"

  - name: dataset-card-exists
    description: "Dataset card can be generated"
    command: "bashrs corpus publish-dataset --output /dev/null"
