# configs/train/ssc-qwen3-4b-qlora.yaml — ShellSafetyBench Qwen3-4B NF4 QLoRA
#
# Run 7: First real LoRA training after ENT-LoRA-001..018 implementation.
# Qwen3-4B (matches Qwen2.5-7B benchmarks) with NF4 quantized base + LoRA adapters.
# Estimated ~5-7 GB VRAM. Cannot run concurrent with albor (~12.6 GB).
#
# Architecture: h=2560, L=36, heads=32, kv_heads=8, FFN=9728, vocab=151936
# Trainable: ~5.9M LoRA params (0.15% of base) across Q+V+O+gate projections
# Optimizer: AdamW on LoRA params only (~0.2 GB states)

model:
  path: "/home/noah/src/models/qwen3-4b/"
  mode: transformer
  config: "/home/noah/src/models/qwen3-4b/config.json"

data:
  train: "/home/noah/src/bashrs/training/shellsafetybench/splits/train.jsonl"
  val: "/home/noah/src/bashrs/training/shellsafetybench/splits/val.jsonl"
  tokenizer: "/home/noah/src/models/qwen3-4b/tokenizer.json"
  seq_len: 512
  batch_size: 4
  input_column: "input"

optimizer:
  name: "adamw"
  lr: 5.0e-5
  weight_decay: 0.01

training:
  mode: "causal_lm"
  epochs: 1
  gradient_accumulation: 4
  warmup_steps: 100
  lr_scheduler: "cosine"
  output_dir: "/home/noah/src/bashrs/training/checkpoints/ssc-chat-v7-qwen3-4b"
  save_interval: 500
  eval_interval: 250
  patience: 5

lora:
  enabled: true
  rank: 16
  alpha: 32.0
  target_modules: [q_proj, v_proj, o_proj, gate_proj]
  quantize_base: true
  quantize_bits: 4
  quant_type: nf4

monitoring:
  terminal:
    enabled: true
